name: Test, Build, and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          gofmt -w .
          git diff --exit-code

      - name: Check modules
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -buildvcs=false -trimpath -ldflags="-s -w" \
            -o "dist/dotbot-${GOOS}-${GOARCH}" ./cmd/dotbot-go

      - name: Package artifact
        run: |
          cp "dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}" dist/dotbot
          tar -C dist -czf "dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" dotbot
          sha256sum "dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            > "dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotbot-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "dotbot-go $TAG_NAME" \
              --notes "Linux and macOS builds for amd64 and arm64."
          fi
          gh release upload "$TAG_NAME" dist/* --clobber
