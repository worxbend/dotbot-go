name: Test, Build, and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, with or without the leading v, for example 0.2.1 or v0.2.1"
        required: true
        type: string
      release_type:
        description: "Publish the GitHub Release as a stable release or prerelease"
        required: true
        default: release
        type: choice
        options:
          - release
          - prerelease

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.metadata.outputs.checkout_ref }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
    steps:
      - name: Prepare metadata
        id: metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          VERSION: ${{ inputs.version }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          checkout_ref="$SHA"
          release_tag=""
          prerelease="false"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            version="${VERSION#v}"
            tag_name="v$version"

            if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
              echo "Version must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease" >&2
              exit 1
            fi

            if [[ "$RELEASE_TYPE" == "prerelease" ]]; then
              prerelease="true"
            fi

            release_tag="$tag_name"
          elif [[ "$REF" == refs/tags/v* ]]; then
            release_tag="$REF_NAME"
            if [[ "$REF_NAME" == *-* ]]; then
              prerelease="true"
            fi
          fi

          {
            echo "checkout_ref=$checkout_ref"
            echo "release_tag=$release_tag"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: false

      - name: Check formatting
        run: |
          gofmt -w .
          git diff --exit-code

      - name: Check modules
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: ./...

      - name: Run tests
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...

      - name: Print coverage
        run: go tool cover -func=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

      - name: Run vet
        run: go vet ./...

      - name: Run vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    needs:
      - prepare
      - test
    permissions:
      contents: write
    outputs:
      checkout_ref: ${{ steps.tag.outputs.checkout_ref }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - name: Check out repository
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Create tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHECKOUT_REF: ${{ needs.prepare.outputs.checkout_ref }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          checkout_ref="$CHECKOUT_REF"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            git fetch --tags --force
            if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
              echo "Tag $RELEASE_TAG already exists" >&2
              exit 1
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$RELEASE_TAG" \
              -m "dotbot-go $RELEASE_TAG" \
              -m "Prerelease: $PRERELEASE"
            git push origin "refs/tags/$RELEASE_TAG"

            checkout_ref="refs/tags/$RELEASE_TAG"
          fi

          {
            echo "checkout_ref=$checkout_ref"
            echo "release_tag=$RELEASE_TAG"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs:
      - tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.checkout_ref }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: false

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          RELEASE_TAG: ${{ needs.tag.outputs.release_tag }}
        run: |
          mkdir -p dist
          version="${RELEASE_TAG#v}"
          if [[ -z "$version" ]]; then
            version="${GITHUB_SHA::12}"
          fi
          go build -buildvcs=false -trimpath \
            -ldflags="-s -w -X dotbot-go/internal/app.Version=$version" \
            -o "dist/dotbot-${GOOS}-${GOARCH}" ./cmd/dotbot-go

      - name: Package artifact
        run: |
          cp "dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}" dist/dotbot
          tar -C dist -czf "dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" dotbot
          sha256sum "dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            > "dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotbot-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            dist/dotbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - tag
      - build
    if: needs.tag.outputs.release_tag != ''
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.checkout_ref }}
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.tag.outputs.release_tag }}
          PRERELEASE: ${{ needs.tag.outputs.prerelease }}
        run: |
          release_args=()
          if [[ "$PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              "${release_args[@]}" \
              --title "dotbot-go $TAG_NAME" \
              --notes "Linux and macOS builds for amd64 and arm64."
          fi
          gh release upload "$TAG_NAME" dist/* scripts/install.sh --clobber
